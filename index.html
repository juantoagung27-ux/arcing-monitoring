<!DOCTYPE html>
<html>
<head>

<title>Arcing Monitoring IoT</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#0f1b2d;
color:white;
text-align:center;
}

.container{
width:90%;
margin:auto;
}

.cards{
display:flex;
justify-content:space-around;
margin-top:30px;
}

.card{
background:#1f2e46;
padding:20px;
border-radius:10px;
width:25%;
}

.card h2{
margin:0;
font-size:18px;
}

.value{
font-size:30px;
margin-top:10px;
}

.status{
margin-top:30px;
background:#1f2e46;
padding:20px;
border-radius:10px;
font-size:28px;
}

.chartBox{
margin-top:40px;
background:#1f2e46;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>ARCING MONITORING IoT SYSTEM</h1>

<div class="container">

<div class="cards">

<div class="card">
<h2>Sensor Cahaya</h2>
<div id="lightValue" class="value">0</div>
</div>

<div class="card">
<h2>Tegangan AC</h2>
<div id="voltageValue" class="value">0</div>
</div>

<div class="card">
<h2>Arus</h2>
<div id="currentValue" class="value">0</div>
</div>

</div>

<div class="status" id="statusText">
Loading...
</div>

<div class="chartBox">

<h2>Grafik Sensor Cahaya dan Arus</h2>

<canvas id="myChart"></canvas>

</div>

</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbwK2hZ5hap5A4XvCfd5_qN89Afojl4fh6gXWBYQDrQXmSn4O1TR2Bbc1WG1XI6Atn1L2g/exec";

const ctx = document.getElementById('myChart');

const chart = new Chart(ctx, {

type: 'line',

data: {

labels: [],

datasets: [

{
label: 'Sensor Cahaya (V)',
data: [],
borderWidth:2,
},

{
label: 'Arus (A)',
data: [],
borderWidth:2,
}

]

},

options:{
animation:false,
scales:{
y:{
beginAtZero:true
}
}
}

});

async function getData(){

try{

const response = await fetch(url);
const data = await response.json();

document.getElementById("lightValue").innerHTML = data.SC;
document.getElementById("voltageValue").innerHTML = data.AC;
document.getElementById("currentValue").innerHTML = data.I;

if(data.SC > 0.5){
document.getElementById("statusText").innerHTML="⚡ ARCING DETECTED";
}
else{
document.getElementById("statusText").innerHTML="Normal";
}

const time = new Date().toLocaleTimeString();

chart.data.labels.push(time);
chart.data.datasets[0].data.push(data.SC);
chart.data.datasets[1].data.push(data.I);

if(chart.data.labels.length>20){

chart.data.labels.shift();
chart.data.datasets[0].data.shift();
chart.data.datasets[1].data.shift();

}

chart.update();

}

catch(error){
console.log(error);
}

}

setInterval(getData,1000);

</script>

</body>

</html>
